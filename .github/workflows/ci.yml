name: GPU Defragmenter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CPU-only PyTorch and dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pandas matplotlib scikit-learn pyarrow pyyaml
          pip install fastapi uvicorn
          pip install pytest pytest-cov

      - name: Run all tests
        run: pytest tests/ -v --tb=short -p no:warnings

      - name: Verify benchmark outputs
        run: |
          python benchmarks/run_local_benchmark.py --runs 2 --steps 10
          python -c "
          import json, csv, os
          for i in [1, 2]:
              data = json.load(open(f'results/run_{i}.json'))
              assert 'oom_count' in data
          rows = list(csv.DictReader(open('results/summary.csv')))
          assert len(rows) == 2
          print('Benchmark artifacts validated.')
          "

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 ruff

      - name: Run Flake8
        run: flake8 gpudefrag/ src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Ruff
        run: ruff check gpudefrag/ src/ tests/ --select E,F,W --ignore E501
